<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>AutoChat — Real-Time WebSocket Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .chat-wrapper {
            width: 100%;
            max-width: 720px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            border: 1px solid #2a2a2a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(99, 102, 241, 0.08);
        }

        .chat-header {
            background: #141414;
            padding: 20px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #2a2a2a;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .chat-header h1 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #f0f0f0;
            letter-spacing: 0.3px;
        }

        .chat-header span {
            margin-left: auto;
            font-size: 0.78rem;
            color: #555;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: #0f0f0f;
        }

        .messages-area::-webkit-scrollbar {
            width: 4px;
        }

        .messages-area::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 75%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message.mine {
            align-self: flex-end;
            align-items: flex-end;
        }

        .message.theirs {
            align-self: flex-start;
            align-items: flex-start;
        }

        .message.system {
            align-self: center;
            align-items: center;
        }

        .message-bubble {
            padding: 10px 16px;
            border-radius: 18px;
            font-size: 0.92rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .mine .message-bubble {
            background: #6366f1;
            color: #fff;
            border-bottom-right-radius: 4px;
        }

        .theirs .message-bubble {
            background: #1e1e1e;
            color: #e0e0e0;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a2a2a;
        }

        .system .message-bubble {
            background: transparent;
            color: #444;
            font-size: 0.78rem;
            border: none;
            padding: 4px 0;
        }

        .message-label {
            font-size: 0.7rem;
            color: #555;
            margin-bottom: 4px;
            padding: 0 4px;
        }

        .chat-footer {
            background: #141414;
            padding: 16px 20px;
            border-top: 1px solid #2a2a2a;
            display: flex;
            gap: 12px;
            align-items: center;
        }

        #messageInput {
            flex: 1;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 12px 18px;
            color: #f0f0f0;
            font-size: 0.92rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #messageInput::placeholder {
            color: #444;
        }

        #messageInput:focus {
            border-color: #6366f1;
        }

        #sendBtn {
            background: #6366f1;
            border: none;
            border-radius: 12px;
            padding: 12px 20px;
            color: #fff;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        #sendBtn:hover {
            background: #4f46e5;
        }

        #sendBtn:active {
            transform: scale(0.97);
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #333;
            font-size: 0.88rem;
            gap: 8px;
        }

        .empty-state .icon {
            font-size: 2rem;
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="chat-wrapper">
    <div class="chat-header">
        <div class="status-dot"></div>
        <h1>AutoChat</h1>
        <span id="client-label"></span>
    </div>

    <div class="messages-area" id="messages">
        <div class="empty-state" id="empty-state">
            <div class="icon">💬</div>
            <div>No messages yet. Say hello.</div>
        </div>
    </div>

    <div class="chat-footer">
        <input id="messageInput" type="text" placeholder="Type a message..." autocomplete="off"/>
        <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    const client_id = Math.floor(Math.random() * 1000);
    document.getElementById("client-label").textContent = `You are Client ${client_id}`;

    const websocket = new WebSocket(`ws://localhost:8000/ws/${client_id}`);

    websocket.onmessage = function(event) {
        const emptyState = document.getElementById("empty-state");
        if (emptyState) emptyState.remove();

        const messagesArea = document.getElementById("messages");
        const raw = event.data;

        const wrapper = document.createElement("div");
        wrapper.classList.add("message");

        const bubble = document.createElement("div");
        bubble.classList.add("message-bubble");

        if (raw.includes("left the chat")) {
            wrapper.classList.add("system");
            bubble.textContent = raw;
        } else {
            const colonIndex = raw.indexOf(":");
            const sender = raw.substring(0, colonIndex).trim();
            const text = raw.substring(colonIndex + 1).trim();
            const isMe = sender === `Client ${client_id}`;

            wrapper.classList.add(isMe ? "mine" : "theirs");

            if (!isMe) {
                const label = document.createElement("div");
                label.classList.add("message-label");
                label.textContent = sender;
                wrapper.appendChild(label);
            }

            bubble.textContent = text;
        }

        wrapper.appendChild(bubble);
        messagesArea.appendChild(wrapper);
        messagesArea.scrollTop = messagesArea.scrollHeight;
    };

    function sendMessage() {
        const input = document.getElementById("messageInput");
        const text = input.value.trim();
        if (!text) return;
        websocket.send(text);
        input.value = "";
    }

    document.getElementById("messageInput").addEventListener("keydown", function(e) {
        if (e.key === "Enter") sendMessage();
    });
</script>

</body>
</html>
